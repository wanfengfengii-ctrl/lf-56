<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}粮仓风险监测系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1e3c72, #2a5298); }
        .sidebar .nav-link { color: rgba(255,255,255,.8); padding: 12px 20px; border-radius: 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.15); }
        .sidebar .nav-link i { margin-right: 10px; }
        .main-content { padding: 24px; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
        .stat-card .stat-icon { font-size: 2.5rem; opacity: .85; }
        .risk-badge { font-size: .85rem; padding: 4px 12px; border-radius: 20px; }
        .risk-high { background: #f8d7da; color: #842029; }
        .risk-medium { background: #fff3cd; color: #856404; }
        .risk-low { background: #d1e7dd; color: #0f5132; }
        .table th { background-color: #f1f3f5; border-bottom: 2px solid #dee2e6; }
        .chart-container { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
        .breadcrumb { background: transparent; padding: 0; margin-bottom: 20px; }
        .page-title { font-weight: 700; color: #1e3c72; margin-bottom: 20px; }
        .informal-tag { background: #e7f5ff; color: #1c7ed6; font-size: .75rem; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
        .status-pending { background: #ffe8cc; color: #d9480f; }
        .status-processed { background: #d3f9d8; color: #2b8a3e; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="p-3 text-white border-bottom border-white-25">
                <h5 class="mb-0"><i class="bi bi-bank2 me-2"></i>粮仓风险监测</h5>
                <small class="text-white-50">Grain Storage Risk Monitor</small>
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2"></i>数据总览
                </a>
                <a class="nav-link {% if 'granary' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'granary_list' %}">
                    <i class="bi bi-building"></i>粮仓管理
                </a>
                <a class="nav-link {% if 'grain_type' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'grain_type_list' %}">
                    <i class="bi bi-bag-fill"></i>粮食品类
                </a>
                <a class="nav-link {% if 'th_log' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'th_log_list' %}">
                    <i class="bi bi-thermometer-half"></i>温湿度记录
                </a>
                <a class="nav-link {% if 'ventilation' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'ventilation_list' %}">
                    <i class="bi bi-fan"></i>通风记录
                </a>
                <a class="nav-link {% if 'pest' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'pest_list' %}">
                    <i class="bi bi-bug-fill"></i>虫害抽检
                </a>
                <a class="nav-link {% if 'risk' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'risk_list' %}">
                    <i class="bi bi-exclamation-triangle-fill"></i>风险评估
                </a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
